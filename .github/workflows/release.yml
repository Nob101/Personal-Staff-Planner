

# Wird in GitHub-Actions ausgeführt
# erst in Frontend, wieder hinaus und dann ins Backend


name: Automated Semantic Release

on:
  push:
    branches:
      - main
jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write
      pull-requests: write


    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Run Semantic Release for Frontend & Backend
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   #FIX: Token für semantic release action mitgeben
        run: |
          cd Frontend && npx semantic-release
          cd ../backend && npx semantic-release