# CLI Befehle:
# Wichtig: Docker Desktop muss gestartet werden/laufen
#   docker compose up --build -d
#   docker compose down
#   docker compose logs -f backend
#   Port mapping ->   Host-Port : Container-Port   WICHTIG!!!!

# docker exec -it psp_database psql -U postgres -d dienstplan -c "\dt"  zeigt alle tabellen

# version: '3.8'

services:
  # --- DATENBANK BEREICH Lukas ---
  db:
    image: postgres:15
    container_name: psp_database
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # --- BACKEND Alexander ---
  backend:
    build: ./backend
    container_name: psp_backend
    restart: always
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - /app/node_modules   #schützt die container module
    environment:
      # WICHTIG: Host ist hier 'db' (der Name des Services oben), nicht localhost!
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}      # <--- fehlte im ersten durchlauf
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_ROLE_ADMIN_PASSWORD: ${DB_ROLE_ADMIN_PASSWORD}
      INITIAL_MARKUS_PASSWORD: ${INITIAL_MARKUS_PASSWORD}
    depends_on:
      - db


  # --- FRONTEND BEREICH für Oliver (VUE) und JD (TAILWIND)  ---
  frontend:
    # HINWEIS für das Frontend:    Docker sucht hier nach dem Ordner 'Frontend' (Großschreibung beachten!)
    build: ./Frontend 
    container_name: psp_frontend
    restart: always
    ports:
      - "5173:5173" # Standard Vite-Port. Falls er geändert wird, hier bitte anpassen OJ!!!!
    
    volumes:
      - ./Frontend:/app         # <--- SPIEGELT VUE-CODE FÜR VITE HOT RELOAD
      - /app/node_modules       # <--- VERHINDERT ÜBERSCHREIBEN DER MODULE
    
    environment:
      # Für den fall, dass Vue wissen muss, wo das Backend läuft: 3001  !!!
      VITE_API_URL: http://localhost:3001
    depends_on:
      - backend

volumes:
  postgres_data: