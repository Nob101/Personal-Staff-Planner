
# entscheidet wo anfragen hingehen
# nginx als Reverse Proxy   Außerhalb kommt HTTPS an, Innerhalb (docker-netz) wird HTTP verwendet
 
events { worker_connections 1024; }
 
http {
 
    #NEU: verhindert das nginx bei Nuestart die Verbindung verliert
    resolver 127.0.0.11 valid=30s;
 
    # NEU: MIME-Type-Problem verhindern (Chrome: Multipurpose Internet Mail Extensions -> Etikett für Datein)
    include       mime.types;
    default_type  application/octet-stream;
 
    # NEU: Manuelle Ergänzung für PWA-Dateien
    types {
        application/manifest+json  webmanifest;
        application/json           json; 
    }
 
# Server Umleiten
    server {
        listen 80;         # umleiten von HTTP zu HTTPS
        server_name localhost;
 
        return 301 https://$host$request_uri;    # erzwingt HTTPS  (permanente Umleitung - verschlüsselte Version)
    }
# Server Hauptkonfiguration
    server {
        listen 443 ssl;
        server_name localhost;
 
        # Wichtig: Pfade zu den Zertifikaten im container nginx
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
 
        # NEU: Sicherheitseinstllung (best practice)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
 
        # NEU: Manifest-Fix für Chrome/Edge (Erzwingt korrektes Etikett)
        location  ~* ^/manifest\.(json|webmanifest)$ {
            proxy_pass http://psp_frontend:5173;
            proxy_hide_header Content-Type;
            add_header Content-Type application/manifest+json;
            add_header Access-Control-Allow-Origin "*";
        }
 
        
 
        # Falls Icons direkt im Root liegen (.ico)
        location ~* \.(ico|png|svg|webmanifest)$ {
            proxy_pass http://psp_frontend:5173;
            proxy_set_header Host $host;
        }

        # NEU: Statische Dateien (Bilder) direkt durchreichen
        location ~* ^/(src|assets|@|node_modules)/ {
            proxy_pass http://psp_frontend:5173;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            add_header Access-Control-Allow-Origin "*";
        }
 
        # frontend-Anfragen (VUE)   - alle Anfragen gehen an den Frontend-container
        location / {
            proxy_pass http://psp_frontend:5173;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
 
        # NEU: damit das index.html keine veraltete/leere Ansicht lädt (cache)
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            proxy_hide_header Cache-Control; # Im Fall das Vue einen eigenen Header sendet => wird überschrieben best practice
 
            # NEU: Timeout damit der Fehler: 'Server lost' verhindert wird
            proxy_read_timeout 1h;
            proxy_send_timeout 1h;
 
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Cookie $http_cookie;
        }
 
        # backend-Anfragen (API)   - alle Anfragen an Express-service
        location /api/ {
            proxy_pass http://psp_backend:3001;
 
            # NEU: Für den Fall dass das Backend mal länger für eine Query braucht (Timeout vs retry!)
            proxy_next_upstream error timeout invalid_header http_502;
            proxy_next_upstream_tries 3;
            proxy_connect_timeout 5s;
 
            # Wichtig: Header damit das backend die echte IP sehen kann
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
 
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;   # sagt dem backend dass HTTPS genutz wird!!
 
            # NEU: CORS /HEADER Support / Authentifizerung
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Authorization $http_authorization;
            proxy_pass_header Authorization;
        }
    }
}