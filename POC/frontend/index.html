<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Dienstplan Vorschau</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Automatischer Dienstplan</h1>

  <section id="controls">
    <label>
      Jahr:
      <input type="number" id="jahrInput" value="2025" min="2000" max="2100" />
    </label>

    <label>
      Monat:
      <input type="number" id="monatInput" value="5" min="1" max="12" />
    </label>

    <button id="ladenBtn" type="button">Dienstplan laden</button>
    <button id="neuGenerieren" type="button"> neu generieren</button>

  </section>

  <section id="result">
    <!-- Hier kommt der Dienstplan rein -->
  </section>

  <script src="app.js"></script>
</body>
</html>
